<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex">
  <title>Redirecting...</title>
  <style>
    body { margin: 0; background: #f9fafb; display: flex; align-items: center;
           justify-content: center; height: 100vh; font-family: Inter, Arial, sans-serif; }
    p { color: #6b7280; font-size: 14px; }
  </style>
</head>
<body>
  <p>Redirecting...</p>
  <script>
    (function () {
      const params      = new URLSearchParams(window.location.search);
      const destination = params.get('url')   || 'https://www.crosslinks.ai/';
      const trackUrl    = params.get('track')  || '';

      // Ping Apps Script to log the click — fire and forget, no CORS issue
      if (trackUrl) {
        var img = new Image();
        img.src = decodeURIComponent(trackUrl);
      }

      // Redirect after tiny delay so ping fires first
      setTimeout(function () {
        window.location.replace(decodeURIComponent(destination));
      }, 100);
    })();
  </script>
</body>
</html>
