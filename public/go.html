<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
</head>
<body>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const destination = params.get('url') || 'https://www.crosslinks.ai/';
      const trackUrl    = params.get('track');

      // Ping Apps Script to log the click — fire and forget
      if (trackUrl) {
        try {
          fetch(decodeURIComponent(trackUrl), { mode: 'no-cors' }).catch(function(){});
        } catch(e) {}
      }

      // Redirect instantly
      window.location.replace(decodeURIComponent(destination));
    })();
  </script>

  <!-- Fallback if JS is disabled -->
  <noscript>
    <meta http-equiv="refresh" content="0;url=https://www.crosslinks.ai/">
  </noscript>
</body>
</html>
